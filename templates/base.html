<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LinkedIn Jobs{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .table td { vertical-align: middle; }
    .job-title { font-weight: 500; }
    .salary { white-space: nowrap; }
    #jobPreview { width: min(46rem, 95vw); }
    .job-description-text { font-size: 0.875rem; line-height: 1.6; }
    .job-description-text p  { margin-bottom: 0.4rem; }
    .job-description-text ul { margin-bottom: 0.5rem; padding-left: 1.4rem; }
    .job-description-text li { margin-bottom: 0.15rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">LinkedIn Job Search</a>
      <div class="d-flex align-items-center gap-3">
        {% if last_ingested %}
        <span class="text-white-50 small" id="lastIngestedLabel"
              {% if last_ingested_iso %}data-ts="{{ last_ingested_iso }}"{% endif %}>Last ingested: {{ last_ingested }}</span>
        {% endif %}
        <button class="btn btn-sm btn-outline-secondary" onclick="showStats()" title="Stats">
          <i class="bi bi-bar-chart"></i>
        </button>
        <a href="https://github.com/dballing/linkedinsearch" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline-secondary" title="GitHub">
          <i class="bi bi-github"></i>
        </a>
        <a href="https://github.com/dballing/linkedinsearch/issues/new" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline-secondary" title="Report an issue">
          <i class="bi bi-bug"></i>
        </a>
      </div>
    </div>
  </nav>

  <div class="modal fade" id="statsModal" tabindex="-1" aria-labelledby="statsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h6 class="modal-title fw-semibold" id="statsModalLabel">Database Stats</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="statsModalBody">
          <div class="text-center py-4"><div class="spinner-border text-secondary" role="status"></div></div>
        </div>
        <div class="modal-footer flex-column align-items-stretch border-top pt-3" id="statsChartSection" style="display:none!important">
          <div id="statsChartWarning" class="alert alert-warning py-2 small mb-2" style="display:none">
            ⚠️ Fewer than 7 days of ingestion history available — chart may not be representative yet.
          </div>
          <canvas id="statsChart" height="120"></canvas>
        </div>
      </div>
    </div>
  </div>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="jobPreview" aria-labelledby="jobPreviewLabel">
    <div class="offcanvas-header border-bottom">
      <h6 class="offcanvas-title fw-semibold" id="jobPreviewLabel">Loading…</h6>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
      <div id="jobPreviewMeta" class="px-3 py-2 bg-light border-bottom small text-muted"></div>
      <div id="jobPreviewBody" class="flex-grow-1 overflow-auto px-3 py-3"></div>
      <div class="px-3 py-2 border-top">
        <a id="jobPreviewLink" href="#" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline-primary d-none">View on LinkedIn</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const el = document.getElementById('lastIngestedLabel');
    if (el && el.dataset.ts) {
      const d = new Date(el.dataset.ts);
      el.textContent = 'Last ingested: ' + d.toLocaleString([], {
        year: 'numeric', month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    }
  });
  </script>
  <script>
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderDescription(raw) {
    if (!raw) return '<em class="text-muted">No description available.</em>';
    const BULLET = /^[•\-\*·–—]\s*(.*)/;

    let html = '';
    let inList = false;
    let afterHeader = false;
    let prose = [];
    let prevWasBlank = true;        // treat start-of-text as blank
    let proseStartedAfterBlank = false;

    // Detect standalone section headers: Title Case, short, no digits, no sentence punctuation.
    function isTitleCase(line) {
      if (line.length > 60 || /[.!]$/.test(line) || /\d/.test(line)) return false;
      return line.split(/\s+/).every(w => /^[A-Z\-–—&\/\(]/.test(w) || /^\W+$/.test(w));
    }

    function flushProse(atBlank) {
      if (!prose.length) return;
      const isolated = proseStartedAfterBlank && atBlank;

      if (prose.length === 1) {
        const l = prose[0];
        if (isolated && isTitleCase(l)) {
          // Standalone Title Case line between blank lines → implicit section header
          html += `<p><strong>${escHtml(l)}</strong></p>`;
          afterHeader = true;
        } else if (afterHeader && l.length > 200) {
          // Long prose paragraph inside a header section → render as prose, exit list mode
          html += `<p>${escHtml(l)}</p>`;
          afterHeader = false;
        } else if (afterHeader) {
          html += `<ul><li>${escHtml(l)}</li></ul>`;
        } else {
          const bold = (l.endsWith(':') || l.length <= 60) && !/[.!?]$/.test(l);
          html += bold ? `<p><strong>${escHtml(l)}</strong></p>` : `<p>${escHtml(l)}</p>`;
        }
      } else if (afterHeader) {
        html += '<ul>' + prose.map(l => `<li>${escHtml(l)}</li>`).join('') + '</ul>';
      } else {
        const avg = prose.reduce((s, l) => s + l.length, 0) / prose.length;
        html += avg <= 80
          ? '<ul>' + prose.map(l => `<li>${escHtml(l)}</li>`).join('') + '</ul>'
          : `<p>${escHtml(prose.join(' '))}</p>`;
      }
      prose = [];
      proseStartedAfterBlank = false;
    }

    for (const rawLine of raw.split('\n')) {
      const line = rawLine.trim();
      if (!line) {
        if (inList) { html += '</ul>'; inList = false; }
        flushProse(true);
        prevWasBlank = true;
        continue;
      }
      const m = line.match(BULLET);
      if (m) {
        flushProse(false);
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escHtml(m[1])}</li>`;
        afterHeader = false;
        prevWasBlank = false;
      } else if (line.endsWith(':')) {
        if (inList) { html += '</ul>'; inList = false; }
        flushProse(false);
        html += `<p><strong>${escHtml(line)}</strong></p>`;
        afterHeader = true;
        prevWasBlank = false;
      } else if (prevWasBlank && isTitleCase(line) && line.split(/\s+/).length >= 3) {
        // Title Case line (≥3 words) immediately after a blank, not isolated —
        // treat as inline section header without waiting for flushProse isolation.
        if (inList) { html += '</ul>'; inList = false; }
        flushProse(false);
        html += `<p><strong>${escHtml(line)}</strong></p>`;
        afterHeader = true;
        prevWasBlank = false;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        if (!prose.length) proseStartedAfterBlank = prevWasBlank;
        prose.push(line);
        prevWasBlank = false;
      }
    }

    if (inList) html += '</ul>';
    flushProse(true);

    return html || '<em class="text-muted">No description available.</em>';
  }

  function showPreview(jobId) {
    const panel   = document.getElementById('jobPreview');
    const titleEl = document.getElementById('jobPreviewLabel');
    const metaEl  = document.getElementById('jobPreviewMeta');
    const bodyEl  = document.getElementById('jobPreviewBody');
    const linkEl  = document.getElementById('jobPreviewLink');

    titleEl.textContent = 'Loading…';
    metaEl.textContent  = '';
    bodyEl.innerHTML    = '<div class="text-center py-5"><div class="spinner-border text-secondary" role="status"></div></div>';
    linkEl.classList.add('d-none');
    bootstrap.Offcanvas.getOrCreateInstance(panel).show();

    fetch('/job/' + jobId)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(job => {
        titleEl.textContent = job.title || '(no title)';
        metaEl.textContent  = [job.company, job.location, job.salary_display || null]
                                .filter(Boolean).join(' · ');
        bodyEl.innerHTML = '<div class="job-description-text">' + renderDescription(job.job_description) + '</div>';
        if (job.linkedin_url) {
          linkEl.href = job.linkedin_url;
          linkEl.classList.remove('d-none');
        }
      })
      .catch(() => {
        titleEl.textContent = 'Error';
        bodyEl.innerHTML    = '<div class="alert alert-danger m-3">Failed to load job details.</div>';
      });
  }
  </script>
  <script>
  let _statsChart = null;

  function showStats() {
    const body         = document.getElementById('statsModalBody');
    const chartSection = document.getElementById('statsChartSection');
    const chartWarning = document.getElementById('statsChartWarning');
    body.innerHTML = '<div class="text-center py-4"><div class="spinner-border text-secondary" role="status"></div></div>';
    chartSection.style.display = 'none';
    bootstrap.Modal.getOrCreateInstance(document.getElementById('statsModal')).show();

    Promise.all([fetch('/stats'), fetch('/stats/history')])
      .then(rs => { if (!rs[0].ok || !rs[1].ok) throw new Error(); return Promise.all(rs.map(r => r.json())); })
      .then(([s, h]) => {
        const statusOrder = [
          'new','reviewed','applied','interviewing','offered','rejected','withdrawn','skipped','closed'
        ];
        const statusRows = statusOrder
          .filter(st => s.by_status[st])
          .map(st => `<tr><td class="text-capitalize">${escHtml(st)}</td><td class="text-end">${s.by_status[st]}</td></tr>`)
          .join('');
        const labelRows = s.by_label.length
          ? s.by_label.map(l => `<tr><td>${escHtml(l.display)}</td><td class="text-end">${l.count}</td></tr>`).join('')
          : '<tr><td colspan="2" class="text-muted">—</td></tr>';

        body.innerHTML = `
          <div class="row g-3 mb-3 text-center">
            <div class="col">
              <div class="fs-3 fw-bold">${s.total}</div>
              <div class="text-muted small">Total jobs</div>
            </div>
            <div class="col">
              <div class="fs-3 fw-bold">${s.new_last_7_days}</div>
              <div class="text-muted small">Added last 7 days</div>
            </div>
          </div>
          <div class="row g-3">
            <div class="col">
              <div class="small fw-semibold text-muted mb-1">By status</div>
              <table class="table table-sm table-borderless mb-0">${statusRows}</table>
            </div>
            ${s.by_label.length ? `
            <div class="col">
              <div class="small fw-semibold text-muted mb-1">By label</div>
              <table class="table table-sm table-borderless mb-0">${labelRows}</table>
            </div>` : ''}
          </div>`;

        // Chart
        if (h.days.length > 0) {
          chartSection.style.removeProperty('display');
          chartWarning.style.display = h.days.length < 7 ? '' : 'none';
          if (_statsChart) _statsChart.destroy();
          _statsChart = new Chart(document.getElementById('statsChart'), {
            type: 'bar',
            data: {
              labels: h.days,
              datasets: [
                { label: 'Inserted',  data: h.inserted,  backgroundColor: '#198754' },
                { label: 'Updated',   data: h.updated,   backgroundColor: '#0d6efd' },
                { label: 'Unchanged', data: h.unchanged, backgroundColor: '#dee2e6' },
              ],
            },
            options: {
              responsive: true,
              plugins: { legend: { position: 'bottom' } },
              scales: { x: { stacked: true }, y: { stacked: true, beginAtZero: true } },
            },
          });
        }
      })
      .catch(() => {
        body.innerHTML = '<div class="alert alert-danger m-3">Failed to load stats.</div>';
      });
  }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
