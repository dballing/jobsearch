<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LinkedIn Jobs{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .table td { vertical-align: middle; }
    .job-title { font-weight: 500; }
    .salary { white-space: nowrap; }
    #jobPreview { width: min(46rem, 95vw); }
    .job-description-text { font-size: 0.875rem; line-height: 1.6; }
    .job-description-text p  { margin-bottom: 0.4rem; }
    .job-description-text ul { margin-bottom: 0.5rem; padding-left: 1.4rem; }
    .job-description-text li { margin-bottom: 0.15rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">LinkedIn Job Search</a>
    </div>
  </nav>
  <div class="container-fluid px-4">
    {% block content %}{% endblock %}
  </div>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="jobPreview" aria-labelledby="jobPreviewLabel">
    <div class="offcanvas-header border-bottom">
      <h6 class="offcanvas-title fw-semibold" id="jobPreviewLabel">Loading…</h6>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column p-0">
      <div id="jobPreviewMeta" class="px-3 py-2 bg-light border-bottom small text-muted"></div>
      <div id="jobPreviewBody" class="flex-grow-1 overflow-auto px-3 py-3"></div>
      <div class="px-3 py-2 border-top">
        <a id="jobPreviewLink" href="#" target="_blank" rel="noopener"
           class="btn btn-sm btn-outline-primary d-none">View on LinkedIn</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function renderDescription(raw) {
    if (!raw) return '<em class="text-muted">No description available.</em>';
    const BULLET = /^[•\-\*·–—]\s*(.*)/;

    let html = '';
    let inList = false;
    let afterHeader = false;
    let prose = [];

    function flushProse() {
      if (!prose.length) return;
      if (prose.length === 1) {
        const l = prose[0];
        html += (l.endsWith(':') || l.length <= 60)
          ? `<p><strong>${escHtml(l)}</strong></p>`
          : `<p>${escHtml(l)}</p>`;
      } else {
        const avg = prose.reduce((s, l) => s + l.length, 0) / prose.length;
        html += avg <= 80
          ? '<ul>' + prose.map(l => `<li>${escHtml(l)}</li>`).join('') + '</ul>'
          : `<p>${escHtml(prose.join(' '))}</p>`;
      }
      prose = [];
    }

    for (const rawLine of raw.split('\n')) {
      const line = rawLine.trim();
      if (!line) {
        if (inList) { html += '</ul>'; inList = false; }
        flushProse();
        afterHeader = false;
        continue;
      }
      const m = line.match(BULLET);
      if (m) {
        flushProse();
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escHtml(m[1])}</li>`;
        afterHeader = false;
      } else if (line.endsWith(':')) {
        if (inList) { html += '</ul>'; inList = false; }
        flushProse();
        html += `<p><strong>${escHtml(line)}</strong></p>`;
        afterHeader = true;
      } else if (afterHeader && line.length <= 120) {
        if (!inList) { html += '<ul>'; inList = true; }
        html += `<li>${escHtml(line)}</li>`;
      } else {
        if (inList) { html += '</ul>'; inList = false; }
        afterHeader = false;
        prose.push(line);
      }
    }

    if (inList) html += '</ul>';
    flushProse();

    return html || '<em class="text-muted">No description available.</em>';
  }

  function showPreview(jobId) {
    const panel   = document.getElementById('jobPreview');
    const titleEl = document.getElementById('jobPreviewLabel');
    const metaEl  = document.getElementById('jobPreviewMeta');
    const bodyEl  = document.getElementById('jobPreviewBody');
    const linkEl  = document.getElementById('jobPreviewLink');

    titleEl.textContent = 'Loading…';
    metaEl.textContent  = '';
    bodyEl.innerHTML    = '<div class="text-center py-5"><div class="spinner-border text-secondary" role="status"></div></div>';
    linkEl.classList.add('d-none');
    bootstrap.Offcanvas.getOrCreateInstance(panel).show();

    fetch('/job/' + jobId)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(job => {
        titleEl.textContent = job.title || '(no title)';
        metaEl.textContent  = [job.company, job.location, job.salary_display || null]
                                .filter(Boolean).join(' · ');
        bodyEl.innerHTML = '<div class="job-description-text">' + renderDescription(job.job_description) + '</div>';
        if (job.linkedin_url) {
          linkEl.href = job.linkedin_url;
          linkEl.classList.remove('d-none');
        }
      })
      .catch(() => {
        titleEl.textContent = 'Error';
        bodyEl.innerHTML    = '<div class="alert alert-danger m-3">Failed to load job details.</div>';
      });
  }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
